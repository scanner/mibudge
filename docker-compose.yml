volumes:
  local_postgres_data: {}
  local_redis_data: {}

services:
  migrate:
    build:
      context: .
      target: dev
    image: mibudge:dev
    container_name: migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app:z
    env_file: deployment/local-dev-docker.env
    environment:
      TZ: ${TIME_ZONE:-America/Los_Angeles}
    command: python /app/manage.py migrate

  backend: &backend
    build:
      context: .
      target: dev
    image: mibudge:dev
    container_name: backend
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./app:/app:z
      - "${HOST_SSL_DIR}:/mnt/ssl:ro"
    env_file: deployment/local-dev-docker.env
    environment:
      ALLOWED_HOSTS: "${HOSTNAME},localhost,0.0.0.0,127.0.0.1"
      TZ: ${TIME_ZONE:-America/Los_Angeles}
    ports:
      - "8000:8000"
    command: /app/scripts/start_dev.sh

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    # Expose postgres for local development access. Keeping ports out of
    # default range to avoid conflicts.
    #
    ports:
      - "6432:5432"
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - "${HOST_DB_BACKUPS_DIR}:/backups:z"
    env_file: deployment/local-dev-docker.env
    # Pin PGDATA to the conventional path. postgres:18-alpine's default
    # is /var/lib/postgresql/18/docker -- a version-scoped subpath --
    # which would not receive the named volume mounted below, so all
    # DB state would live in the container's writable layer and be
    # lost on recreate. Keeping this override makes the mount work
    # the same across postgres major versions.
    #
    environment:
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-debug} -d ${POSTGRES_DB:-mibudge}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  redis:
    image: redis:7-alpine
    container_name: redis
    # Expose ports for local development access. Keeping ports out of
    # default range to avoid conflicts.
    #
    ports:
      - "7379:6379"
    volumes:
      - local_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celeryworker:
    <<: *backend
    image: mibudge:dev
    container_name: celeryworker
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports: []
    command: /app/scripts/start_celeryworker.sh

  celerybeat:
    <<: *backend
    image: mibudge:dev
    container_name: celerybeat
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports: []
    command: /app/scripts/start_celerybeat.sh

  flower:
    <<: *backend
    image: mibudge:dev
    container_name: flower
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    command: /app/scripts/start_flower.sh
