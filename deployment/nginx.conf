# nginx configuration for the mibudge production container.
#
# Listens on port 8000. Serves /static/ directly from collected staticfiles;
# proxies everything else to gunicorn on a Unix socket.
#
# The Caddy/nginx reverse proxy in front of this container handles TLS and
# sets X-Forwarded-Proto so Django's SECURE_PROXY_SSL_HEADER works correctly.

user app;
worker_processes auto;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Write temp files to /tmp so the app user can write them
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;
    fastcgi_temp_path /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path /tmp/nginx_uwsgi_temp;
    scgi_temp_path /tmp/nginx_scgi_temp;

    upstream gunicorn {
        server unix:/tmp/gunicorn.sock fail_timeout=0;
    }

    server {
        listen 8000;
        server_name _;

        client_max_body_size 10M;

        # Serve static files with aggressive caching. Vite hashes filenames
        # so cache-busting is automatic.
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy everything else to gunicorn
        location / {
            proxy_pass http://gunicorn;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            proxy_redirect off;

            # Support long-lived SSE / WebSocket connections
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }
}
