exclude: 'docs|node_modules|migrations|.git|.tox'
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy ./app/
        language: system
        pass_filenames: false
        types: [python]

      - id: oxfmt
        name: oxfmt (frontend)
        entry: sh -c 'cd frontend && pnpm fmt'
        language: system
        pass_filenames: false
        files: ^frontend/src/

      - id: vue-tsc
        name: vue-tsc (frontend)
        entry: sh -c 'cd frontend && pnpm type-check'
        language: system
        pass_filenames: false
        files: ^frontend/src/
