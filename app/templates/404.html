<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found &mdash; mibudge</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#1a1a1a;background:#f5f5f5;margin:0;padding:0}
    .wrap{max-width:480px;margin:80px auto;padding:0 16px;text-align:center}
    h1{font-size:48px;font-weight:700;color:#0ea5e9;margin:0 0 8px}
    h2{font-size:20px;font-weight:600;margin:0 0 16px}
    p{color:#6b7280;line-height:1.6;margin:0 0 24px}
    a{color:#0ea5e9;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="wrap">
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>{% if exception %}{{ exception }}{% else %}This page does not exist.{% endif %} <a href="/app/">Go back to mibudge</a>.</p>
</div>
</body>
</html>
