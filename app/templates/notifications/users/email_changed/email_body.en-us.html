<h2 style="margin:0 0 8px; font-size:16px; color:#1a1a1a;">Email address changed</h2>
<p style="margin:0 0 8px; color:#374151;">
  Your mibudge email address was changed on {{ changed_at }}.
</p>
<p style="margin:0 0 4px; color:#374151;">
  Previous address: <strong>{{ from_email }}</strong>
</p>
<p style="margin:0 0 8px; color:#374151;">
  New address: <strong>{{ to_email }}</strong>
</p>
<p style="margin:0 0 8px; color:#374151;">
  If you made this change, no action is needed.
</p>
<p style="margin:0 0 8px; color:#b91c1c; font-weight:500;">
  If you did not make this change, contact support immediately.
</p>
<p style="margin:0; font-size:13px; color:#374151;">
  <a href="mailto:{{ support_email }}" style="color:#1d4ed8;">{{ support_email }}</a>
</p>
