<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ subject }}</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;background-color:#f5f5f5;margin:0;padding:0;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f5f5">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <tr>
            <td bgcolor="#0ea5e9" style="padding:24px 32px;">
              <span style="color:#ffffff;font-size:20px;font-weight:bold;">My Budgets</span>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px;">
              <p style="margin:0;margin-bottom:16px;color:#1a1a1a;">Hi{% if user.name %} {{ user.name }}{% endif %},</p>
              {{ html_body }}
            </td>
          </tr>
          <tr>
            <td bgcolor="#f9fafb" style="padding:16px 32px;font-size:12px;color:#9ca3af;">
              You're receiving this because you have notifications enabled in your My Budgets account.
              &nbsp;&middot;&nbsp;
              <a href="{{ site_url }}/app/" style="color:#9ca3af;text-decoration:none;">Open My Budgets</a>
              &nbsp;&middot;&nbsp;
              <a href="mailto:{{ support_email }}" style="color:#9ca3af;text-decoration:none;">{{ support_email }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
