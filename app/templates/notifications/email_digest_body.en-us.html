<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your mibudge digest</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1a1a1a; background: #f5f5f5; margin: 0; padding: 0; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #0ea5e9; padding: 24px 32px; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; font-weight: 600; }
    .body { padding: 24px 32px; }
    .item { border-bottom: 1px solid #e5e7eb; padding-bottom: 20px; margin-bottom: 20px; }
    .item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .footer { background: #f9fafb; padding: 16px 32px; font-size: 12px; color: #9ca3af; }
    a { color: #0ea5e9; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Your mibudge digest</h1>
    </div>
    <div class="body">
      <p>Hi{% if user.name %} {{ user.name }}{% endif %},</p>
      {% for item in items %}
      <div class="item">
        {{ item.html_body }}
      </div>
      {% endfor %}
    </div>
    <div class="footer">
      You're receiving this because you have notifications enabled in your mibudge account.
    </div>
  </div>
</body>
</html>
