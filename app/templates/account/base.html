<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block head_title %}mibudge{% endblock %}</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#1a1a1a;background:#f5f5f5;margin:0;padding:0}
    .nav{background:#0ea5e9;padding:12px 24px}
    .nav a{color:#fff;text-decoration:none;font-size:16px;font-weight:600}
    .wrap{max-width:480px;margin:64px auto;padding:0 16px}
    .card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.12);padding:32px}
    h1{font-size:20px;font-weight:600;margin:0 0 20px}
    p{color:#374151;line-height:1.6;margin:0 0 16px}
    label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
    input[type=email],input[type=password],input[type=text]{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:4px;font-size:14px;margin-bottom:4px}
    input[type=email]:focus,input[type=password]:focus,input[type=text]:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 2px rgba(14,165,233,.2)}
    .helptext{display:block;font-size:12px;color:#6b7280;margin-bottom:12px}
    .errorlist{color:#dc2626;font-size:13px;list-style:none;padding:0;margin:0 0 8px}
    .btn,.btn-primary{display:inline-block;padding:10px 20px;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none}
    .btn-primary{background:#0ea5e9;color:#fff}
    .btn-primary:hover{background:#0284c7}
    a{color:#1d4ed8}
  </style>
</head>
<body>
<div class="nav"><a href="/app/">mibudge</a></div>
<div class="wrap">
  <div class="card">
    {% block inner %}{% endblock %}
  </div>
</div>
</body>
</html>
