<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email address change notice &mdash; {{ site_display_name }}</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;background-color:#f5f5f5;margin:0;padding:0;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f5f5">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <tr>
            <td bgcolor="#0ea5e9" style="padding:20px 32px;">
              <span style="color:#ffffff;font-size:20px;font-weight:bold;">{{ site_display_name }}</span>
              <span style="color:#bae6fd;font-size:13px;margin-left:12px;">{{ site_url }}</span>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;">
              <h2 style="margin:0 0 16px;font-size:18px;color:#1a1a1a;">Email address change notice</h2>
              <p style="margin:0 0 16px;color:#374151;">
                A request to associate this email address with a
                {{ site_display_name }} account has been cancelled.
                No action is required on your part.
              </p>
            </td>
          </tr>
          <tr>
            <td bgcolor="#f9fafb" style="padding:16px 32px;font-size:12px;color:#9ca3af;">
              Questions?
              <a href="mailto:{{ support_email }}" style="color:#9ca3af;text-decoration:none;">{{ support_email }}</a>
              &nbsp;&middot;&nbsp;
              <a href="{{ site_url }}" style="color:#9ca3af;text-decoration:none;">{{ site_url }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
