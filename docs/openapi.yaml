    InternalTransaction:
      type: object
      description: |-
        Serializer for internal transactions (budget-to-budget transfers).

        Internal transactions are write-once: the API supports create and
        read but not update or delete.  To reverse a transfer, create a
        new internal transaction with the src and dst budgets swapped.

        On create the caller supplies bank_account, amount, src_budget,
        and dst_budget.  The view sets the actor to the requesting user.

        The ``amount_currency`` is read from raw request data by
        djmoney's ``MoneyField.get_value()`` -- no explicit currency
        field declaration is needed.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        bank_account:
          type: string
          format: uuid
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        amount_currency:
          type: string
          readOnly: true
        src_budget:
          type: string
          format: uuid
        dst_budget:
          type: string
          format: uuid
        actor:
          type: integer
          readOnly: true
        effective_date:
          type: string
          format: date-time
        src_budget_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        src_budget_balance_currency:
          type: string
          readOnly: true
        dst_budget_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        dst_budget_balance_currency:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        modified_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - actor
      - amount
      - amount_currency
      - bank_account
      - created_at
      - dst_budget
      - dst_budget_balance
      - dst_budget_balance_currency
      - id
      - modified_at
      - src_budget
      - src_budget_balance
      - src_budget_balance_currency
    InternalTransactionRequest:
      type: object
      description: |-
        Serializer for internal transactions (budget-to-budget transfers).

        Internal transactions are write-once: the API supports create and
        read but not update or delete.  To reverse a transfer, create a
        new internal transaction with the src and dst budgets swapped.

        On create the caller supplies bank_account, amount, src_budget,
        and dst_budget.  The view sets the actor to the requesting user.

        The ``amount_currency`` is read from raw request data by
        djmoney's ``MoneyField.get_value()`` -- no explicit currency
        field declaration is needed.
      properties:
        bank_account:
          type: string
          format: uuid
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        src_budget:
          type: string
          format: uuid
        dst_budget:
          type: string
          format: uuid
        effective_date:
          type: string
          format: date-time
      required:
      - amount
      - bank_account
      - dst_budget
      - src_budget
