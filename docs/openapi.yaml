          format: date-time
        transaction_date:
          type: string
          format: date-time
          nullable: true
        transaction_type:
          oneOf:
          - $ref: '#/components/schemas/TransactionTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        pending:
          type: boolean
          default: false
        memo:
          type: string
          nullable: true
          maxLength: 512
        raw_description:
          type: string
          minLength: 1
          maxLength: 512
        description:
          type: string
          maxLength: 512
        image:
          type: string
          format: binary
          nullable: true
        document:
          type: string
          format: binary
          nullable: true
      required:
      - amount
      - bank_account
      - posted_date
      - raw_description
      - transaction_type
    TransactionSplitsRequest:
      type: object
      description: |-
        Serializer for the declarative splits endpoint.

        Accepts a dict mapping budget UUIDs to amounts.  The backend
        reconciles existing allocations to match the declared state.
        Any remainder goes to the unallocated budget.

        All budgets must belong to the same bank account as the
        transaction.  Cross-account budget references are rejected
        with a 400 error.
      properties:
        splits:
          type: object
          additionalProperties:
            type: string
            format: decimal
            pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          description: Map of budget UUID → amount.  Amounts must not exceed the transaction
            total.  Omitted remainder is assigned to the unallocated budget.
      required:
      - splits
    TransactionTypeEnum:
      enum:
      - signature_purchase
      - ach
      - round-up_transfer
      - protected_goal_account_transfer
      - fee
      - pin_purchase
      - signature_credit
      - interest_credit
      - shared_transfer
      - courtesy_credit
      - atm_withdrawal
      - bill_payment
      - bank_generated_credit
      - wire_transfer
      - check_deposit
      - check
      - c2c
      - migration_interbank_transfer
      - balance_sweep
      - ach_reversal
      - adjustment
      - signature_return
      - fx_order
      type: string
      description: |-
        * `signature_purchase` - Signature Purchase
        * `ach` - ACH
        * `round-up_transfer` - Round-up Transfer
        * `protected_goal_account_transfer` - Protected Goal Account Transfer
        * `fee` - Fee
        * `pin_purchase` - Pin Purchase
        * `signature_credit` - Signature Credit
        * `interest_credit` - Interest Credit
        * `shared_transfer` - Shared Transfer
        * `courtesy_credit` - Courtesy Credit
        * `atm_withdrawal` - ATM Withdrawal
        * `bill_payment` - Bill Payment
        * `bank_generated_credit` - Bank Generated Credit
        * `wire_transfer` - Wire Transfer
        * `check_deposit` - Check Deposit
        * `check` - Check
        * `c2c` - c2c
        * `migration_interbank_transfer` - Migration Interbank Transfer
        * `balance_sweep` - Balance Sweep
        * `ach_reversal` - ACH Reversal
        * `adjustment` - Adjustment
        * `signature_return` - Signature return
        * `fx_order` - FX Order
        * `` - --------
    User:
      type: object
      description: |-
        Serializer for user profiles.

        The ``default_bank_account`` field is writable but constrained:
        the bank account must be owned by the user being updated.  On
        output it returns the UUID string (or null).
      properties:
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        name:
          type: string
          title: Name of User
          maxLength: 255
        url:
          type: string
          format: uri
          readOnly: true
        default_bank_account:
          type: string
          format: uuid
          nullable: true
        timezone:
          type: string
          maxLength: 100
      required:
      - url
      - username
    UserRequest:
      type: object
      description: |-
        Serializer for user profiles.

        The ``default_bank_account`` field is writable but constrained:
        the bank account must be owned by the user being updated.  On
        output it returns the UUID string (or null).
      properties:
        name:
          type: string
          title: Name of User
          maxLength: 255
        default_bank_account:
          type: string
          format: uuid
          nullable: true
        timezone:
          type: string
          minLength: 1
          maxLength: 100
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
