components:
  schemas:
    AccountTypeEnum:
      enum:
      - C
      - S
      - X
      type: string
      description: |-
        * `C` - Checking
        * `S` - Savings
        * `X` - Credit Card
    Bank:
      type: object
      description: |-
        Read-only serializer for banks.

        Banks are shared reference data managed only through the admin.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        routing_number:
          type: string
          readOnly: true
          nullable: true
        default_currency:
          type: string
          readOnly: true
          description: ISO 4217 currency code (e.g. USD, EUR, GBP).
        created_at:
          type: string
          format: date-time
          readOnly: true
        modified_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - default_currency
      - id
      - modified_at
      - name
      - routing_number
    BankAccount:
      type: object
      description: |-
        Serializer for bank accounts.

        On create the caller supplies name, bank (UUID), account_type,
        account_number, and optionally currency and initial balances.
        The view routes creation through BankAccountService which adds
        the requesting user as owner and seeds the Unallocated budget.

        After creation, name and account_number are updatable.  Currency,
        account_type, bank, and balances are immutable once the account
        exists.

        Group assignment is not yet supported via the API.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        bank:
          type: string
          format: uuid
        owners:
          type: array
          items:
            type: string
            description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
              only.
          readOnly: true
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'
        account_number:
          type: string
          nullable: true
          maxLength: 32
        currency:
          type: string
          description: ISO 4217 currency code (e.g. USD, EUR, GBP).
          maxLength: 3
        posted_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        posted_balance_currency:
          type: string
          readOnly: true
        available_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        available_balance_currency:
          type: string
          readOnly: true
        unallocated_budget:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        last_imported_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Wall-clock time of the most recent completed import for this
            account.
        last_posted_through:
          type: string
          format: date
          readOnly: true
          nullable: true
          description: Latest posted_date seen in the most recent import batch. The
            funding engine will not process events dated after this value.
        created_at:
          type: string
          format: date-time
          readOnly: true
        modified_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - available_balance_currency
      - bank
      - created_at
      - id
      - last_imported_at
      - last_posted_through
      - modified_at
      - name
      - owners
      - posted_balance_currency
      - unallocated_budget
    BankAccountRequest:
      type: object
      description: |-
        Serializer for bank accounts.

        On create the caller supplies name, bank (UUID), account_type,
        account_number, and optionally currency and initial balances.
        The view routes creation through BankAccountService which adds
        the requesting user as owner and seeds the Unallocated budget.

        After creation, name and account_number are updatable.  Currency,
        account_type, bank, and balances are immutable once the account
        exists.

        Group assignment is not yet supported via the API.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        bank:
          type: string
          format: uuid
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'
        account_number:
          type: string
          nullable: true
          maxLength: 32
        currency:
          type: string
          minLength: 1
          description: ISO 4217 currency code (e.g. USD, EUR, GBP).
          maxLength: 3
        posted_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        available_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - bank
      - name
    BlankEnum:
      enum:
      - ''
    Budget:
      type: object
      description: |-
        Serializer for budgets.

        On create the caller supplies bank_account (UUID) and budget
        properties.  After creation, bank_account and budget_type are
        immutable.  Balance is managed by signals and is always read-only.
        The unallocated budget's name cannot be changed.

        Currency is inherited from the bank account via the pre_save
        signal and is not accepted from the client.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        bank_account:
          type: string
          format: uuid
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        balance_currency:
          type: string
          readOnly: true
        target_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        target_balance_currency:
          type: string
          readOnly: true
        funding_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          nullable: true
        funding_amount_currency:
          type: string
          readOnly: true
          nullable: true
        budget_type:
          $ref: '#/components/schemas/BudgetTypeEnum'
        funding_type:
          $ref: '#/components/schemas/FundingTypeEnum'
        target_date:
          type: string
          format: date
          nullable: true
        with_fillup_goal:
          type: boolean
        fillup_goal:
          type: string
          format: uuid
          nullable: true
        archived:
          type: boolean
          readOnly: true
        archived_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        complete:
          type: boolean
          readOnly: true
          description: True when this budget has reached its target and should not
            be funded further.  Managed by signals and funding tasks; do not set manually.
        paused:
          type: boolean
          description: A paused budget does not get automatically funded on its schedule.
        funding_schedule:
          type: string
        recurrance_schedule:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
          maxLength: 512
        auto_spend: {}
        next_funding:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            Return the next scheduled funding event for this budget, or null.

            Args:
                obj: The Budget instance being serialized.

            Returns:
                Dict with 'date', 'amount', 'amount_currency', 'deferred', or None.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        modified_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - archived
      - archived_at
      - balance
      - balance_currency
      - bank_account
      - complete
      - created_at
      - funding_amount_currency
      - id
      - modified_at
      - name
      - next_funding
      - target_balance
      - target_balance_currency
    BudgetRequest:
      type: object
      description: |-
        Serializer for budgets.

        On create the caller supplies bank_account (UUID) and budget
        properties.  After creation, bank_account and budget_type are
        immutable.  Balance is managed by signals and is always read-only.
        The unallocated budget's name cannot be changed.

        Currency is inherited from the bank account via the pre_save
        signal and is not accepted from the client.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        bank_account:
          type: string
          format: uuid
        target_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        funding_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          nullable: true
        budget_type:
          $ref: '#/components/schemas/BudgetTypeEnum'
        funding_type:
          $ref: '#/components/schemas/FundingTypeEnum'
        target_date:
          type: string
          format: date
          nullable: true
        with_fillup_goal:
          type: boolean
        fillup_goal:
          type: string
          format: uuid
          nullable: true
        paused:
          type: boolean
          description: A paused budget does not get automatically funded on its schedule.
        funding_schedule:
          type: string
        recurrance_schedule:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
          maxLength: 512
        auto_spend: {}
      required:
      - bank_account
      - name
      - target_balance
    BudgetTypeEnum:
      enum:
      - G
      - R
      - A
      - C
      type: string
      description: |-
        * `G` - Goal
        * `R` - Recurring
        * `A` - Associated Fill-up Goal
        * `C` - Capped
